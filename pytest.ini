[pytest]
asyncio_mode = auto

# Répertoires de tests
testpaths =
    tests/unit
    tests/integration

# Couverture minimale 80 %
addopts =
    --cov=core
    --cov=channels
    --cov-report=term-missing
    --cov-fail-under=80
    -v

# Marqueurs reconnus
markers =
    unit: Tests unitaires rapides (pas d'I/O réelle)
    integration: Tests d'intégration (DB, API)
    slow: Tests lents (>1s)
