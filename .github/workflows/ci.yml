name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

# Cancel in-progress runs on the same ref to avoid wasted runners
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linters
        run: pip install ruff==0.4.4 black==23.3.0

      - name: ruff check
        run: ruff check .

      - name: black check
        run: black --check .

  # ── 2. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      # Required by core/settings.py at import time; not a real secret in CI
      SECURITY_MASTER_KEY: ci-dummy-key-not-for-production
      # Force SQLite in CI — no PostgreSQL service needed
      USE_POSTGRES: "false"
      # Disable Playwright browser launch in tests (unit tests are browser-free)
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run unit tests with coverage
        run: pytest tests/unit -v --cov=core --cov=channels --cov-report=xml --cov-fail-under=80

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── 3. Security ──────────────────────────────────────────────────────────────
  security:
    name: Security audit (pip-audit)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        # --skip-editable: skip local packages; -r: audit without installing
        run: pip-audit -r requirements.txt --skip-editable
